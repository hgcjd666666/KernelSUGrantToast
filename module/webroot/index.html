<!doctype html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Setting</title>
</head>
<body>
<input maxlength="64" type="text" id="customToastTextInput" placeholder="%s 已被授予超级用户权限">
<label for="customToastTextInput">自定义提示消息(须带有%s占位符用于显示应用名且长度小于64字符)</label>
<br>
<button id="saveCustomToastText">保存提示消息</button>
<br>
<label for="ignorePackageNames">忽略提示的应用包名(以';'分隔)</label><textarea
        id="ignorePackageNames"
        placeholder="示例:com.abc.test;com.def.test"
        style="width:90%;"
        maxlength="4096"></textarea>
<br>
<button id="saveIgnorePackageNames">保存忽略包名</button>
<br>
<br>
<span>高级设置(设置不当可能影响性能或导致工作异常)</span>
<br>
<input maxlength="2" step="1" type="number" max="32" min="0" id="packageSearchDepthInput" placeholder="1">
<label for="packageSearchDepthInput">应用包搜索深度(过高影响性能 过低可能导致某些提权数据被忽略 默认1)
    <br>
    <span>通常保持默认已经够用 除非比较在意"Termux里运行的Codex里执行了su"这种极端情况</span>
</label>
<br>
<button id="savePackageSearchDepth">保存搜索深度</button>
<br>
<span>所有更改需重启生效</span>
</body>
<script>
    let customToastTextInputElement;
    let ignorePackageNamesElement;
    let packageSearchDepthInputElement;
    function shellQuote(value) {
        return `'${String(value).replace(/'/g, `'\\''`)}'`;
    }
    window.onLoadCustomMessageConfig=(errno,stdout,stderr)=>{
        if(errno===0){
            customToastTextInputElement.value=stdout;
            return
        }
    };
    window.onLoadIgnorePackageNamesConfig=(errno,stdout,stderr)=>{
        if(errno===0){
            ignorePackageNamesElement.value=stdout;
            return
        }
    };
    window.onLoadPackageSearchDepthConfig=(errno,stdout,stderr)=>{
        if(errno===0){
            packageSearchDepthInputElement.value=stdout?stdout:"1";
            return
        }
    };
    window.addEventListener("load",()=>{
        customToastTextInputElement=document.getElementById("customToastTextInput");
        ignorePackageNamesElement=document.getElementById("ignorePackageNames");
        packageSearchDepthInputElement=document.getElementById("packageSearchDepthInput");
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config get customToastText`,"onLoadCustomMessageConfig")
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config get ignorePackageNames`,"onLoadIgnorePackageNamesConfig")
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config get packageSearchDepth`,"onLoadPackageSearchDepthConfig")
    });
    document.getElementById("saveCustomToastText").addEventListener("click",()=>{
        //校验
        const tempInputValue=customToastTextInputElement.value;
        if(tempInputValue===""){
            ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config delete customToastText`)
            alert("已恢复默认消息");
            return
        }else if(tempInputValue.length>64||!tempInputValue.includes("%s")){
            alert("消息无效 需带有%s占位符且长度小于64字符");
            return
        }
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config set customToastText ${shellQuote(tempInputValue)}`);
        alert("保存成功");
    });
    document.getElementById("saveIgnorePackageNames").addEventListener("click",()=>{
        //校验
        let tempInputValue=ignorePackageNamesElement.value;
        if(tempInputValue===""){
            ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config delete ignorePackageNames`)
            alert("已恢复默认配置");
            return
        }
        if(tempInputValue.endsWith(";")){
            tempInputValue=tempInputValue.substring(0,tempInputValue.length-1);
            ignorePackageNamesElement.value=tempInputValue;
        }
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config set ignorePackageNames ${shellQuote(tempInputValue)}`)
        alert("保存成功");
    });
    document.getElementById("savePackageSearchDepth").addEventListener("click",()=>{
        const tempInputValue=packageSearchDepthInputElement.value;
        if(tempInputValue===""){
            ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config delete packageSearchDepth`);
            alert("已恢复默认配置");
            return
        }
        const parsedValue=parseInt(tempInputValue);
        if(isNaN(parsedValue)||parsedValue<0||parsedValue>32){
            alert("请输入有效的数字 数值应为0-32之间");
            return
        }
        packageSearchDepthInputElement.value=parsedValue;
        ksu.exec(`export KSU_MODULE=ksuGrantToast&&/data/adb/ksud module config set packageSearchDepth ${shellQuote(tempInputValue)}`);
        alert("保存成功");
    });
</script>
</html>
