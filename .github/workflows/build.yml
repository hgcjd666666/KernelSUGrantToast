name: Build KernelSU Module

on:
  push:
    tags: [ '*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          sdkmanager --install "ndk;28.0.13004108" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Fill version placeholders
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "unknown")
          fi
          VERSION_CODE=$(echo "$VERSION" | sed 's/.*\.//')
          sed -i "s/@VERSION@/$VERSION/g" module/module.prop
          sed -i "s/@VERSION_CODE@/$VERSION_CODE/g" module/module.prop

      - name: Build module
        run: |
          chmod +x ./gradlew
          ./gradlew buildModule --no-daemon

      - name: Upload module zip (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: KernelSUGrantToast
          path: tempOutput/KernelSUGrantToast/
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: KernelSUGrantToast
          path: tempOutput/KernelSUGrantToast/

      - name: Zip module
        run: |
          cd tempOutput/KernelSUGrantToast
          zip -r ../KernelSUGrantToast.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: tempOutput/KernelSUGrantToast.zip
          generate_release_notes: true
